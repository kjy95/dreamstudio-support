<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DreamStudio</title>
  <style>
    :root {
      --bg: #f7f1e8;
      --paper: rgba(255, 255, 255, 0.84);
      --ink: #34251d;
      --muted: #7f695c;
      --rose: #c46b73;
      --apricot: #e4a178;
      --line: rgba(52, 37, 29, 0.08);
      --shadow: 0 18px 48px rgba(84, 55, 39, 0.12);
      --radius: 28px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Iowan Old Style", "Apple SD Gothic Neo", "Noto Serif KR", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(228, 161, 120, 0.34), transparent 28%),
        radial-gradient(circle at bottom right, rgba(196, 107, 115, 0.24), transparent 26%),
        var(--bg);
      line-height: 1.65;
    }

    .wrap {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 72px;
    }

    .hero,
    .card {
      background: var(--paper);
      backdrop-filter: blur(10px);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .hero {
      padding: 40px 28px 32px;
      margin-bottom: 20px;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(196, 107, 115, 0.12);
      color: var(--rose);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1, h2, h3, p { margin: 0; }

    h1 {
      font-size: clamp(34px, 4vw, 48px);
      line-height: 1.08;
      margin-bottom: 10px;
    }

    .subtitle {
      color: var(--muted);
      font-size: 17px;
      max-width: 700px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .card {
      display: block;
      padding: 26px 22px;
      color: inherit;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease, border-color 180ms ease;
    }

    .card:hover {
      transform: translateY(-3px);
      border-color: rgba(196, 107, 115, 0.22);
      box-shadow: 0 22px 56px rgba(84, 55, 39, 0.16);
    }

    .label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    h2 {
      font-size: 26px;
      margin-bottom: 10px;
    }

    .note {
      color: var(--muted);
      font-size: 15px;
    }

    .footer {
      margin-top: 20px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 720px) {
      .wrap { width: min(100% - 20px, 920px); padding-top: 20px; }
      .hero { padding: 28px 20px 24px; }
      .grid { grid-template-columns: 1fr; }
      .card { padding: 22px 18px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <div class="eyebrow">DreamStudio</div>
      <h1>App Support Hub</h1>
      <p class="subtitle">
        DreamStudio에서 제공하는 앱의 지원 페이지와 개인정보 처리방침을 한곳에서 확인할 수 있습니다.
        아래 앱 카드를 눌러 필요한 페이지로 이동해 주세요.
      </p>
    </section>

    <section class="grid">
      <a class="card" href="54dayprayer.html">
        <div class="label">App</div>
        <h2>54일기도</h2>
        <p class="note">묵주기도 여정을 기록하고 이어갈 수 있는 기도 앱</p>
      </a>
    </section>

    <p class="footer">© DreamStudio</p>
  </main>
</body>
</html>
