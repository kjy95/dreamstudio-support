<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>54일기도</title>
  <style>
    :root {
      --bg: #f7f1e8;
      --paper: rgba(255, 255, 255, 0.84);
      --ink: #34251d;
      --muted: #7f695c;
      --rose: #c46b73;
      --line: rgba(52, 37, 29, 0.08);
      --shadow: 0 18px 48px rgba(84, 55, 39, 0.12);
      --radius: 28px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Iowan Old Style", "Apple SD Gothic Neo", "Noto Serif KR", serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(228, 161, 120, 0.34), transparent 28%),
        radial-gradient(circle at bottom right, rgba(196, 107, 115, 0.24), transparent 26%),
        var(--bg);
      line-height: 1.65;
    }

    .wrap {
      width: min(920px, calc(100% - 32px));
      margin: 0 auto;
      padding: 48px 0 72px;
    }

    .hero, .card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .hero {
      padding: 40px 28px 32px;
      margin-bottom: 20px;
    }

    .back {
      display: inline-block;
      margin-bottom: 18px;
      color: var(--muted);
      text-decoration: none;
    }

    .eyebrow {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      background: rgba(196, 107, 115, 0.12);
      color: var(--rose);
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      margin-bottom: 16px;
    }

    h1, h2, p { margin: 0; }
    h1 { font-size: clamp(32px, 4vw, 46px); line-height: 1.08; margin-bottom: 10px; }
    h2 { font-size: 24px; margin-bottom: 10px; }
    .subtitle, .note { color: var(--muted); }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
    }

    .card {
      display: block;
      padding: 26px 22px;
      color: inherit;
      text-decoration: none;
      transition: transform 180ms ease, box-shadow 180ms ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 22px 56px rgba(84, 55, 39, 0.16);
    }

    .label {
      font-size: 13px;
      font-weight: 700;
      color: var(--muted);
      letter-spacing: 0.02em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    @media (max-width: 720px) {
      .wrap { width: min(100% - 20px, 920px); padding-top: 20px; }
      .hero { padding: 28px 20px 24px; }
      .grid { grid-template-columns: 1fr; }
      .card { padding: 22px 18px; }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="hero">
      <a class="back" href="dreamstudio-support.html">← DreamStudio로 돌아가기</a>
      <div class="eyebrow">54일기도</div>
      <h1>54일기도 안내</h1>
      <p class="subtitle">지원이 필요하거나 개인정보 처리방침을 확인하려면 아래 카드로 이동해 주세요.</p>
    </section>

    <section class="grid">
      <a class="card" href="54dayprayer-support.html">
        <div class="label">Support</div>
        <h2>문의하기 페이지</h2>
        <p class="note">오류 제보, 사용 문의, 광고 제거 구매 및 복원 관련 안내</p>
      </a>

      <a class="card" href="privacy-policy.html">
        <div class="label">Privacy</div>
        <h2>개인정보 처리방침</h2>
        <p class="note">54일기도 앱의 개인정보 수집, 이용, 보관 정책 안내</p>
      </a>
    </section>

    <p style="margin-top:20px; color:var(--muted); text-align:center;">© DreamStudio</p>
  </main>
</body>
</html>
